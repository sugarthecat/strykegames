<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prosperity 4 Trading Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0e1116;
    --panel: #161b22;
    --panel-2: #1c2129;
    --border: #2a313c;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
  }
  header {
    padding: 12px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  header h1 {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
  }
  header h1 span { color: var(--accent); }
  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    margin-left: auto;
  }
  .controls label {
    font-size: 12px;
    color: var(--muted);
  }
  select, input[type="file"], button {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-family: inherit;
  }
  button { cursor: pointer; }
  button:hover { background: #252b35; }
  main {
    padding: 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
  }
  .panel h2 {
    margin: 0 0 10px 0;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .full { grid-column: 1 / -1; }
  .chart-wrap {
    position: relative;
    height: 320px;
  }
  .chart-wrap.tall { height: 380px; }
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
  }
  .stat {
    background: var(--panel-2);
    padding: 10px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }
  .stat .label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .stat .value {
    font-size: 18px;
    font-weight: 600;
    margin-top: 4px;
  }
  .pos { color: var(--green); }
  .neg { color: var(--red); }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  th, td {
    text-align: right;
    padding: 4px 8px;
    border-bottom: 1px solid var(--border);
  }
  th {
    color: var(--muted);
    font-weight: 500;
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: 0.5px;
  }
  td.bid { color: var(--green); }
  td.ask { color: var(--red); }
  .empty {
    padding: 40px;
    text-align: center;
    color: var(--muted);
  }
  .empty code {
    background: var(--panel-2);
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 11px;
  }
  .file-info {
    color: var(--muted);
    font-size: 11px;
  }
  .product-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .pill {
    background: var(--panel-2);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 11px;
  }
  .pill.active {
    background: var(--accent);
    color: #0e1116;
    border-color: var(--accent);
  }
</style>
</head>
<body>

<header>
  <h1>Prosperity 4 <span>Trading Dashboard</span></h1>
  <div class="controls">
    <label>CSV / .log:</label>
    <input type="file" id="fileInput" accept=".csv,.log,.json" multiple>
    <span class="file-info" id="fileInfo">No file loaded</span>
    <button id="clearBtn">Clear</button>
  </div>
</header>

<main id="main">
  <div class="empty full" id="empty">
    <p>Upload Prosperity 4 price CSVs or <code>.log</code> submission files to begin.</p>
    <p>CSV columns: <code>day;timestamp;product;bid_price_1;...;mid_price;profit_and_loss</code></p>
    <p><code>.log</code> files additionally overlay your buy/sell trades on the price chart.</p>
  </div>
</main>

<script src="dashboard.js" defer></script>
</body>
</html>
